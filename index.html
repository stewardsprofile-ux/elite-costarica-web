<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ELITE COSTA RICA</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="home-page">
    <main class="home-scroll">
        <section class="home-shell home-panel" aria-labelledby="home-title">
            <div class="home-bg-carousel" aria-hidden="true">
                <div class="home-bg-slide active" style="background-image: url('assets/home-bg-gold-chains.png');"></div>
                <div class="home-bg-slide" style="background-image: url('assets/home-bg-gold-rings.png');"></div>
            </div>

            <div class="home-hero">
            <img class="home-logo" src="assets/logo.png" alt="Elite Costa Rica">
            <p class="home-kicker">LUJO A TU NIVEL</p>
            <h1 id="home-title">Catalogos exclusivos</h1>
            <p class="home-copy">Selecciona el catalogo que quieres explorar.</p>

            <div class="home-actions" aria-label="Catalogos disponibles">
                <a class="home-card" href="/catalogo">
                    <span class="home-card-label">Perfumeria</span>
                </a>
                <a class="home-card home-card-gold" href="/oro">
                    <span class="home-card-label">Oro 10k</span>
                </a>
            </div>
            </div>
        </section>

        <section class="home-testimonials home-panel" id="home-testimonials" aria-labelledby="home-testimonials-title">
            <div class="home-testimonials-head">
                <img class="home-testimonials-logo" src="assets/logo.png" alt="Elite Costa Rica">
                <p class="home-kicker">CLIENTES ELITE</p>
                <h2 id="home-testimonials-title">Testimonios</h2>
                <p>Historias reales en una vista compacta. Desliza las capturas o visita la seccion completa.</p>
                <a class="home-testimonials-link" href="/testimonios">Ver todos los testimonios</a>
            </div>

            <div class="home-years" id="homeYears"></div>
        </section>
    </main>

    <script src="home.js" defer></script>
</body>
</html>
