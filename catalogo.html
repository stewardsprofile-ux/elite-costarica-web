<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ELITE PARFUMS</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <img class="logo" src="assets/logo.png" alt="Elite Parfums">
    <h1 class="titulo">ELITE PARFUMS</h1>

    <div class="search-container">
        <div class="search-box-wrapper">
            <input id="search" type="search" placeholder="Buscar perfume...">
            <button onclick="abrirBot()" class="btn-ia-search">✨ Encuentra mi Perfume</button>
        </div>
    </div>

    <div class="filtros-principales">
        <button class="tipo active" data-tipo="Todos">Todos</button>
        <button class="tipo" data-tipo="Arabes">Árabes</button>
        <button class="categoria" data-cat="Hombre">Hombre</button>
        <button class="categoria" data-cat="Mujer">Mujer</button>
        <button class="categoria" data-cat="Unisex">Unisex</button>
        <button class="tipo" data-tipo="Estuches">Estuches</button>
    </div>

    <div class="contenedor-marcas-scroll">
        <button class="flecha-scroll" onclick="scrollMarcas(-200)">❮</button>
        <div id="contenedorMarcas" class="grid-marcas"></div>
        <button class="flecha-scroll" onclick="scrollMarcas(200)">❯</button>
    </div>

    <div class="seccion-oro-container">
        <button class="btn-seccion" onclick="irAOro()">
            <span>ORO 10K</span>
        </button>
    </div>

    <div class="testimonios-container">
        <a href="/testimonios" class="btn-testimonios">testimonios</a>
    </div>
</header>

<div id="catalogo"></div>
<div id="loader">Cargando perfumes...</div>

<div id="bot-modal">
    <div class="bot-content">
        <span onclick="cerrarBot()" class="close-bot">&times;</span>
        
        <div id="quiz-content">
            <h2 id="pregunta-titulo">¿Para quién sería el perfume?</h2>
            <div id="opciones-container">
                </div>
        </div>

        <div id="resultados-bot" style="display:none;">
            <h2 class="resultado-titulo">🏆 Tus Matches Perfectos</h2>
            <p class="resultado-subtitulo">Selección exclusiva basada en tus preferencias:</p>
            <div id="lista-matches">
                </div>
            <button onclick="cerrarBot()" class="btn-volver">Volver al Catálogo</button>
        </div>
    </div>
</div>

<div id="visorImagen">
    <img id="imagenGrande">
    <button id="cerrarVisor">✕</button>
</div>

<button id="btnArriba" title="Ir arriba">↑</button>

<script src="script.js" defer></script>
</body>
</html>
